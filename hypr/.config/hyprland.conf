# ============================================================
# MONITORS
# ============================================================
monitor = DP-1,3440x1440@100,0x0,1
monitor = HDMI-A-1,disabled

# ============================================================
# AUTOSTART
# ============================================================
exec-once = sleep 1 && waybar
exec-once = swaync
exec-once = awww-daemon
exec-once = sleep 2 && hypridle
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ============================================================
# ENVIRONMENT VARIABLES
# ============================================================
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = GTK_THEME,catppuccin-mocha
env = QT_QPA_PLATFORM,wayland
env = GTK_THEME,catppuccin-mocha-teal-standard+default
env = GDK_BACKEND,wayland

# ============================================================
# INPUT
# ============================================================
input {
    kb_layout = us
    follow_mouse = 1
    accel_profile = flat
}

# ============================================================
# GENERAL
# ============================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(94e2d5) rgb(cba6f7) 45deg
    col.inactive_border = rgb(313244)
    layout = dwindle
}

# ============================================================
# DECORATION
# ============================================================
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 15
        render_power = 2
        color = rgba(1e1e2ebb)
    }
}

# ============================================================
# ANIMATIONS
# ============================================================
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ============================================================
# WINDOW RULES
# ============================================================
windowrule = opacity 0.95 0.85, match:class (.*)

# ============================================================
# KEYBINDS
# ============================================================
$mod = SUPER

# Core
bind = $mod, Return, exec, ghostty
bind = $mod, W, killactive
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, M, exit
bind = $mod, E, exec, thunar
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod, Space, exec, rofi -show drun
bind = $mod, P, exec, ~/.config/hypr/scripts/toggle-tv.sh
bind = $mod, N, exec, swaync-client -t

# Window Management
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod SHIFT, Space, togglefloating
bind = $mod, J, togglesplit

# Scratchpad
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Screenshots
bind = ,Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move Windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize
binde = $mod ALT, right, resizeactive, 30 0
binde = $mod ALT, left, resizeactive, -30 0
binde = $mod ALT, up, resizeactive, 0 -30
binde = $mod ALT, down, resizeactive, 0 30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to Workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Audio
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
