format = """
$directory\
$git_branch\
$git_status\
$character"""

[directory]
style = "bold fg:#89b4fa"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "fg:#cba6f7"
format = "[$symbol$branch ]($style)"

[git_status]
style = "fg:#f38ba8"
format = "[$all_status$ahead_behind ]($style)"

[character]
success_symbol = "[❯](bold fg:#a6e3a1)"
error_symbol = "[❯](bold fg:#f38ba8)"

[cmd_duration]
style = "fg:#f9e2af"
format = "[took $duration ]($style)"

[python]
symbol = " "
style = "fg:#f9e2af"
format = "[$symbol$version ]($style)"

[rust]
symbol = " "
style = "fg:#fab387"
format = "[$symbol$version ]($style)"

[nodejs]
symbol = " "
style = "fg:#a6e3a1"
format = "[$symbol$version ]($style)"
